name: USBODE CI Build

permissions:
  contents: write

on:
  push:
    branches: [ "*" ]
    paths-ignore:
      - "README.md"
      - ".github/**"
      - "version.txt"
      - "os-sublist.json"
      - "docs/**"
      - "/update-os-sublist.sh"
  workflow_dispatch:
    branches: [ "main" ]

jobs:
  build:

    runs-on: [self-hosted]

    steps:
    - name: Clean workspace
      run: |
        git clean -ffdx
        git reset --hard HEAD
        git submodule foreach --recursive git clean -ffdx
        git submodule foreach --recursive git reset --hard HEAD
        git submodule deinit --all --force
    
    - uses: actions/checkout@v6
      with:
        submodules:  recursive
        clean: true

    # circle-deps / boot re-download these from GitHub on every build once
    # "Clean workspace" + submodule deinit wipe them out. On a self-hosted
    # runner building frequently, unauthenticated raw-file fetches to
    # RPi-Distro/firmware-nonfree can hit GitHub's rate limit (HTTP 429) and
    # fail the whole build. Cache them across runs; the key is derived from
    # the pinned firmware commit hash in each Makefile, so bumping either
    # FIRMWARE variable upstream automatically invalidates the cache instead
    # of silently keeping stale blobs.
    - name: Cache WLAN firmware
      uses: actions/cache@v4
      with:
        path: circle-stdlib/libs/circle/addon/wlan/firmware
        key: wlan-firmware-${{ hashFiles('circle-stdlib/libs/circle/addon/wlan/firmware/Makefile') }}

    - name: Cache boot firmware
      uses: actions/cache@v4
      with:
        # Only the files boot/Makefile downloads, never the tracked
        # sources (Makefile, armstub/*, config*.txt) that ship in the
        # circle submodule itself, so a cache restore can never shadow a
        # newer tracked file with a stale cached one.
        path: |
          circle-stdlib/libs/circle/boot/LICENCE.broadcom
          circle-stdlib/libs/circle/boot/COPYING.linux
          circle-stdlib/libs/circle/boot/bootcode.bin
          circle-stdlib/libs/circle/boot/start*.elf
          circle-stdlib/libs/circle/boot/fixup*.dat
          circle-stdlib/libs/circle/boot/*.dtb
          circle-stdlib/libs/circle/boot/*.dtbo
        key: boot-firmware-${{ hashFiles('circle-stdlib/libs/circle/boot/Makefile') }}

    - name: Build
      run: make release BUILD_NUMBER=${{ github.run_number }}

    - name: Get filename
      id: get-filename
      run: |
        FILENAME_FULL=$(ls usbode*.zip | grep -v -- '-64bit.zip' | xargs basename)
        FILENAME=${FILENAME_FULL%.zip}
        echo "Found file: $FILENAME"
        echo "filename=$FILENAME" >> $GITHUB_OUTPUT

    - name: Get commit hash
      id: get-commit
      run: |
        echo "commit_hash=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

    - uses: actions/upload-artifact@v7
      with:
        name: ${{ steps.get-filename.outputs.filename }}-images IMG
        path: imgout/${{ steps.get-filename.outputs.filename }}.img.xz
        if-no-files-found: error
        retention-days: 90
        compression-level: 6
        overwrite: true
        include-hidden-files: false

    - uses: actions/upload-artifact@v7
      with:
        name: ${{ steps.get-filename.outputs.filename }}-images-64bit IMG
        path: imgout/${{ steps.get-filename.outputs.filename }}-64bit.img.xz
        if-no-files-found: error
        retention-days: 90
        compression-level: 6
        overwrite: true
        include-hidden-files: false

    - name: Clean Images Folder
      run: make clean-imagesfolder

    - uses: actions/upload-artifact@v7
      with:
        # Using the extracted filename as the artifact name
        name: ${{ steps.get-filename.outputs.filename }}
        path: dist/*
        if-no-files-found: error
        retention-days: 90
        compression-level: 6
        overwrite: true
        include-hidden-files: false

    - uses: actions/upload-artifact@v7
      with:
        # Using the extracted filename as the artifact name
        name: ${{ steps.get-filename.outputs.filename }}-64bit
        path: dist64/*
        if-no-files-found: error
        retention-days: 90
        compression-level: 6
        overwrite: true
        include-hidden-files: false

    - name: Create upgrade packages
      run: |
        # Create upgrade directory
        mkdir -p upgrade
        cp buildinfo.json dist/
        # Create 32-bit upgrade tar and CRC
        cd dist
        tar -cf ../upgrade/sysupgrade32.tar *
        cd ../upgrade
        crc32 sysupgrade32.tar > sysupgrade32.crc
        cd ..

        # Create 64-bit upgrade tar and CRC
        cp buildinfo.json dist64/
        cd dist64
        tar -cf ../upgrade/sysupgrade64.tar *
        cd ../upgrade
        crc32 sysupgrade64.tar > sysupgrade64.crc
        cd ..

    - uses: actions/upload-artifact@v7
      with:
        name: sysupgrade32
        path: upgrade/sysupgrade32.tar
        if-no-files-found: error
        retention-days: 90
        compression-level: 6
        overwrite: true

    - uses: actions/upload-artifact@v7
      with:
        name: sysupgrade32crc
        path: upgrade/sysupgrade32.crc
        if-no-files-found: error
        retention-days: 90
        compression-level: 6
        overwrite: true

    - uses: actions/upload-artifact@v7
      with:
        name: sysupgrade64
        path: upgrade/sysupgrade64.tar
        if-no-files-found: error
        retention-days: 90
        compression-level: 6
        overwrite: true
        include-hidden-files: false

    - uses: actions/upload-artifact@v7
      with:
        name: sysupgrade64crc
        path: upgrade/sysupgrade64.crc
        if-no-files-found: error
        retention-days: 90
        compression-level: 6
        overwrite: true

    - name: Create Release (on main only)
      if: github.ref == 'refs/heads/main'
      id: create-release
      uses: softprops/action-gh-release@v3
      with:
        tag_name: build-${{ github.run_number }}
        name: USBODE build-${{ github.run_number }}
        files: | 
          ${{ steps.get-filename.outputs.filename }}.zip
          ${{ steps.get-filename.outputs.filename }}-64bit.zip
          imgout/${{ steps.get-filename.outputs.filename }}.img.xz
          imgout/${{ steps.get-filename.outputs.filename }}-64bit.img.xz
          upgrade/sysupgrade32.tar
          upgrade/sysupgrade32.crc
          upgrade/sysupgrade64.tar
          upgrade/sysupgrade64.crc
          buildinfo.json
        prerelease: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}