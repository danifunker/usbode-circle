name: USBODE CI Build

permissions:
  contents: write

on:
  push:
    branches: [ "*" ]
    paths-ignore:
      - "README.md"
      - ".github/**"
      - "version.txt"
      - "os-sublist.json"
      - "docs/**"
      - "/update-os-sublist.sh"
  workflow_dispatch:
    branches: [ "main" ]

jobs:
  build:

    runs-on: [self-hosted]

    steps:
    - name: Clean workspace
      run: |
        git clean -ffdx
        git reset --hard HEAD
        git submodule foreach --recursive git clean -ffdx
        git submodule foreach --recursive git reset --hard HEAD
        git submodule deinit --all --force
    
    - uses: actions/checkout@v6
      with:
        submodules:  recursive
        clean: true

    # circle-deps / boot re-download these from GitHub on every build once
    # "Clean workspace" + submodule deinit wipe them out. On a self-hosted
    # runner building frequently, unauthenticated raw-file fetches to
    # RPi-Distro/firmware-nonfree can hit GitHub's rate limit (HTTP 429) and
    # fail the whole build. Cache them across runs; the key is derived from
    # the pinned firmware commit hash in each Makefile, so bumping either
    # FIRMWARE variable upstream automatically invalidates the cache instead
    # of silently keeping stale blobs.
    - name: Cache WLAN firmware
      uses: actions/cache@v4
      with:
        path: circle-stdlib/libs/circle/addon/wlan/firmware
        key: wlan-firmware-${{ hashFiles('circle-stdlib/libs/circle/addon/wlan/firmware/Makefile') }}

    - name: Cache boot firmware
      uses: actions/cache@v4
      with:
        # Only the files boot/Makefile downloads, never the tracked
        # sources (Makefile, armstub/*, config*.txt) that ship in the
        # circle submodule itself, so a cache restore can never shadow a
        # newer tracked file with a stale cached one.
        path: |
          circle-stdlib/libs/circle/boot/LICENCE.broadcom
          circle-stdlib/libs/circle/boot/COPYING.linux
          circle-stdlib/libs/circle/boot/bootcode.bin
          circle-stdlib/libs/circle/boot/start*.elf
          circle-stdlib/libs/circle/boot/fixup*.dat
          circle-stdlib/libs/circle/boot/*.dtb
          circle-stdlib/libs/circle/boot/*.dtbo
        key: boot-firmware-${{ hashFiles('circle-stdlib/libs/circle/boot/Makefile') }}

    # A restored cache or an earlier failed download can contain 0-byte
    # firmware files: wget -O creates the destination before the transfer
    # starts, and the circle boot Makefile's download loop ignores per-file
    # wget failures. Build-947 "succeeded" that way while shipping 0-byte
    # bootcode.bin/fixup.dat — which bricks Pi Zero (2) W cards — and the
    # poisoned files were then saved into the cache. Delete any empty files
    # so the prefetch step / make re-download them instead.
    - name: Purge empty firmware files (cache poison guard)
      run: |
        find circle-stdlib/libs/circle/addon/wlan/firmware \
             circle-stdlib/libs/circle/boot \
             -maxdepth 1 -type f -size 0 -print -delete

    # When the caches above miss, fetch the same files through api.github.com
    # with the workflow token instead of letting make wget them anonymously:
    # authenticated requests use a per-token quota (1000 req/h) that is not
    # affected by the anonymous per-IP throttle that rate-limited this runner
    # (HTTP 429 -> wget "Error 8" -> silent 0-byte files, see above). The file
    # lists and pinned refs are parsed from the two Makefiles at run time, so
    # a FIRMWARE pin bump upstream is picked up automatically. Non-fatal: if
    # this step fails, make falls back to its own wget exactly as before.
    #
    # Each file is fetched only if missing or empty, and every download goes
    # to a temp file that is moved into place only when non-empty, so a failed
    # transfer can never leave a 0-byte file for make to treat as done.
    - name: Prefetch firmware via GitHub API (on cache miss)
      continue-on-error: true
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        set -uo pipefail
        fetch() { # $1 owner/repo  $2 ref  $3 path-in-repo  $4 dest-file
          local tmp="$4.fetch-tmp"
          if curl -sSfL --retry 3 --retry-delay 10 \
               -H "Authorization: Bearer $GH_TOKEN" \
               -H "Accept: application/vnd.github.raw" \
               "https://api.github.com/repos/$1/contents/$3?ref=$2" -o "$tmp" \
             && [ -s "$tmp" ]; then
            mv "$tmp" "$4"
          else
            rm -f "$tmp"
            echo "prefetch FAILED for $3"
            return 1
          fi
        }

        rc=0

        FW=circle-stdlib/libs/circle/addon/wlan/firmware
        SHA=$(sed -n 's/^FIRMWARE ?= *//p' "$FW/Makefile")
        while read -r _ _ _ dest url; do
          [ -s "$FW/$dest" ] && continue
          fetch RPi-Distro/firmware-nonfree "$SHA" \
                "debian/config/brcm80211/${url#'$(BASEURL)/'}" "$FW/$dest" || rc=1
        done < <(grep -E '^[[:space:]]*wget -q -O ' "$FW/Makefile")

        BOOT=circle-stdlib/libs/circle/boot
        SHA=$(make -pn -C "$BOOT" 2>/dev/null | sed -n 's/^FIRMWARE = //p' | tail -n1)
        FILES=$(make -pn -C "$BOOT" 2>/dev/null | sed -n 's/^FILES = //p' | tail -n1)
        OVERLAYS=$(make -pn -C "$BOOT" 2>/dev/null | sed -n 's/^OVERLAYS = //p' | tail -n1)
        for f in $FILES; do
          [ -s "$BOOT/$f" ] || fetch raspberrypi/firmware "$SHA" "boot/$f" "$BOOT/$f" || rc=1
        done
        for f in $OVERLAYS; do
          [ -s "$BOOT/$f" ] || fetch raspberrypi/firmware "$SHA" "boot/overlays/$f" "$BOOT/$f" || rc=1
        done

        exit $rc

    - name: Build
      run: make release BUILD_NUMBER=${{ github.run_number }}

    # Refuse to ship a build containing empty files. A verified-good build
    # has none (checked against a local clean build), and empty boot firmware
    # looks like a successful build while bricking every Pi Zero (2) W card
    # it is flashed or sysupgraded onto (build-947, build-950).
    - name: Verify no empty files in distribution
      run: |
        bad=$(find dist dist64 -type f -size 0)
        if [ -n "$bad" ]; then
          echo "ERROR: empty files in distribution:"
          echo "$bad"
          exit 1
        fi
        for f in dist/bootcode.bin dist/fixup.dat dist/start.elf \
                 dist64/bootcode.bin dist64/fixup.dat dist64/start.elf; do
          if [ ! -s "$f" ]; then
            echo "ERROR: missing or empty critical boot file: $f"
            exit 1
          fi
        done
        echo "All distribution files verified non-empty"

    - name: Get filename
      id: get-filename
      run: |
        FILENAME_FULL=$(ls usbode*.zip | grep -v -- '-64bit.zip' | xargs basename)
        FILENAME=${FILENAME_FULL%.zip}
        echo "Found file: $FILENAME"
        echo "filename=$FILENAME" >> $GITHUB_OUTPUT

    - name: Get commit hash
      id: get-commit
      run: |
        echo "commit_hash=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

    - uses: actions/upload-artifact@v7
      with:
        name: ${{ steps.get-filename.outputs.filename }}-images IMG
        path: imgout/${{ steps.get-filename.outputs.filename }}.img.xz
        if-no-files-found: error
        retention-days: 90
        compression-level: 6
        overwrite: true
        include-hidden-files: false

    - uses: actions/upload-artifact@v7
      with:
        name: ${{ steps.get-filename.outputs.filename }}-images-64bit IMG
        path: imgout/${{ steps.get-filename.outputs.filename }}-64bit.img.xz
        if-no-files-found: error
        retention-days: 90
        compression-level: 6
        overwrite: true
        include-hidden-files: false

    - name: Clean Images Folder
      run: make clean-imagesfolder

    - uses: actions/upload-artifact@v7
      with:
        # Using the extracted filename as the artifact name
        name: ${{ steps.get-filename.outputs.filename }}
        path: dist/*
        if-no-files-found: error
        retention-days: 90
        compression-level: 6
        overwrite: true
        include-hidden-files: false

    - uses: actions/upload-artifact@v7
      with:
        # Using the extracted filename as the artifact name
        name: ${{ steps.get-filename.outputs.filename }}-64bit
        path: dist64/*
        if-no-files-found: error
        retention-days: 90
        compression-level: 6
        overwrite: true
        include-hidden-files: false

    - name: Create upgrade packages
      run: |
        # Create upgrade directory
        mkdir -p upgrade
        cp buildinfo.json dist/
        # Create 32-bit upgrade tar and CRC
        cd dist
        tar -cf ../upgrade/sysupgrade32.tar *
        cd ../upgrade
        crc32 sysupgrade32.tar > sysupgrade32.crc
        cd ..

        # Create 64-bit upgrade tar and CRC
        cp buildinfo.json dist64/
        cd dist64
        tar -cf ../upgrade/sysupgrade64.tar *
        cd ../upgrade
        crc32 sysupgrade64.tar > sysupgrade64.crc
        cd ..

    - uses: actions/upload-artifact@v7
      with:
        name: sysupgrade32
        path: upgrade/sysupgrade32.tar
        if-no-files-found: error
        retention-days: 90
        compression-level: 6
        overwrite: true

    - uses: actions/upload-artifact@v7
      with:
        name: sysupgrade32crc
        path: upgrade/sysupgrade32.crc
        if-no-files-found: error
        retention-days: 90
        compression-level: 6
        overwrite: true

    - uses: actions/upload-artifact@v7
      with:
        name: sysupgrade64
        path: upgrade/sysupgrade64.tar
        if-no-files-found: error
        retention-days: 90
        compression-level: 6
        overwrite: true
        include-hidden-files: false

    - uses: actions/upload-artifact@v7
      with:
        name: sysupgrade64crc
        path: upgrade/sysupgrade64.crc
        if-no-files-found: error
        retention-days: 90
        compression-level: 6
        overwrite: true

    - name: Create Release (on main only)
      if: github.ref == 'refs/heads/main'
      id: create-release
      uses: softprops/action-gh-release@v3
      with:
        tag_name: build-${{ github.run_number }}
        name: USBODE build-${{ github.run_number }}
        files: | 
          ${{ steps.get-filename.outputs.filename }}.zip
          ${{ steps.get-filename.outputs.filename }}-64bit.zip
          imgout/${{ steps.get-filename.outputs.filename }}.img.xz
          imgout/${{ steps.get-filename.outputs.filename }}-64bit.img.xz
          upgrade/sysupgrade32.tar
          upgrade/sysupgrade32.crc
          upgrade/sysupgrade64.tar
          upgrade/sysupgrade64.crc
          buildinfo.json
        prerelease: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}